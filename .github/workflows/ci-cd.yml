name: Ecommerce CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests
        run: mvn clean test
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build jar
        run: mvn clean package -DskipTests

  sonar:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: SonarQube Scan
        run: mvn verify sonar:sonar \
          -Dsonar.projectKey=ecommerce \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}

  deploy:
    needs: [ build, sonar ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Render
        run: |
          echo "🚀 Triggering Render deployment..."

          # Trigger deploy
          RESPONSE=$(curl -s -X POST \
            "https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}")

          echo "📋 Deploy Response:"
          echo "$RESPONSE"

          # Check if successful
          if echo "$RESPONSE" | grep -q "success\|triggered"; then
            echo "✅ Deploy triggered successfully!"
          else
            echo "⚠️ Deploy response:"
            echo "$RESPONSE"
          fi

      - name: Wait and Check Status
        run: |
          echo "⏳ Waiting for Render deployment..."
          sleep 30

          echo "📋 Checking Render status..."
          curl -s -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/srv-${{ secrets.RENDER_SERVICE_ID }}" | jq '.service.status'